# CIVITAS — Google Cloud Build CI/CD Pipeline
#
# Triggers:
#   - Push to `main` branch
#
# Pipeline stages:
#   1. Run agent unit tests (pytest)
#   2. Run frontend tests and build (vitest + vite build)
#   3. Build and push Docker images for backend and agents
#   4. Deploy backend to Cloud Run
#   5. Deploy agents service to Cloud Run
#   6. Deploy frontend to Firebase Hosting
#
# Required substitutions (set in GCP Console or trigger config):
#   _REGION: Cloud Run deployment region (default: us-central1)
#   _PROJECT_ID: GCP project ID

steps:

  # ── Stage 1: Agent Unit Tests ──
  - name: 'python:3.11-slim'
    id: 'test-agents'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd agents
        pip install -q -r ../backend/requirements.txt pydantic pytest pytest-asyncio
        python -m pytest tests/ -v --tb=short
    waitFor: ['-']

  # ── Stage 2: Frontend Tests & Build ──
  - name: 'node:20-alpine'
    id: 'test-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        npm ci --silent
        npm run test
        npm run build
    waitFor: ['-']

  # ── Stage 3: Integration Tests ──
  - name: 'python:3.11-slim'
    id: 'test-integration'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -q -r backend/requirements.txt pydantic pytest pytest-asyncio
        cd agents && pip install -q -e . 2>/dev/null; cd ..
        python -m pytest tests/ -v --tb=short
    waitFor: ['test-agents']

  # ── Stage 4: Build Backend Docker Image ──
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/civitas-backend:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/civitas-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'
    waitFor: ['test-integration']

  # ── Stage 5: Build Agents Docker Image ──
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-agents'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/civitas-agents:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/civitas-agents:latest'
      - '-f'
      - 'agents/Dockerfile'
      - '.'
    waitFor: ['test-integration']

  # ── Stage 6: Push Docker Images ──
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', 'gcr.io/${_PROJECT_ID}/civitas-backend:${SHORT_SHA}']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-agents'
    args: ['push', 'gcr.io/${_PROJECT_ID}/civitas-agents:${SHORT_SHA}']
    waitFor: ['build-agents']

  # ── Stage 7: Deploy Backend to Cloud Run ──
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-backend'
    args:
      - 'run'
      - 'deploy'
      - 'civitas-backend'
      - '--image=gcr.io/${_PROJECT_ID}/civitas-backend:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=1Gi'
      - '--timeout=60'
      - '--allow-unauthenticated'
      - '--set-env-vars=CIVITAS_DEMO_MODE=true'
    waitFor: ['push-backend']

  # ── Stage 8: Deploy Agents to Cloud Run ──
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-agents'
    args:
      - 'run'
      - 'deploy'
      - 'civitas-agents'
      - '--image=gcr.io/${_PROJECT_ID}/civitas-agents:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=2Gi'
      - '--timeout=120'
      - '--no-allow-unauthenticated'
    waitFor: ['push-agents']

  # ── Stage 9: Deploy Frontend to Firebase Hosting ──
  - name: 'gcr.io/cloud-builders/firebase'
    id: 'deploy-frontend'
    args: ['deploy', '--only', 'hosting', '--project=${_PROJECT_ID}']
    dir: 'frontend'
    waitFor: ['test-frontend']

# Docker images to push to GCR
images:
  - 'gcr.io/${_PROJECT_ID}/civitas-backend:${SHORT_SHA}'
  - 'gcr.io/${_PROJECT_ID}/civitas-backend:latest'
  - 'gcr.io/${_PROJECT_ID}/civitas-agents:${SHORT_SHA}'
  - 'gcr.io/${_PROJECT_ID}/civitas-agents:latest'

substitutions:
  _REGION: 'us-central1'
  _PROJECT_ID: 'civitas-demo'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '900s'
